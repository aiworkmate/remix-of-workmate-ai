<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="dark light">
    <title>AI WorkMate</title>
    <link rel="stylesheet" href="/styles.css?v=20260530-v3">
  </head>
  <body>
    <svg class="sprite" aria-hidden="true">
      <symbol id="i-chat" viewBox="0 0 24 24"><path d="M4 5.8A3.8 3.8 0 0 1 7.8 2h8.4A3.8 3.8 0 0 1 20 5.8v5.7a3.8 3.8 0 0 1-3.8 3.8H10l-4.3 4.1a1 1 0 0 1-1.7-.7V5.8Z"/></symbol>
      <symbol id="i-grid" viewBox="0 0 24 24"><path d="M4 4h7v7H4V4Zm9 0h7v7h-7V4ZM4 13h7v7H4v-7Zm9 0h7v7h-7v-7Z"/></symbol>
      <symbol id="i-brain" viewBox="0 0 24 24"><path d="M9.2 4.1A3.5 3.5 0 0 1 15 6.7v.1a3.4 3.4 0 0 1 4 4.8 3.8 3.8 0 0 1-2.5 6.8H15a3 3 0 0 1-6 0H7.5A3.8 3.8 0 0 1 5 11.6a3.4 3.4 0 0 1 4-4.8v-.1c0-1 .4-1.9 1.2-2.6Z"/></symbol>
      <symbol id="i-upload" viewBox="0 0 24 24"><path d="M12 3 6.5 8.5 8 10l3-3v9h2V7l3 3 1.5-1.5L12 3ZM5 18h14v2H5v-2Z"/></symbol>
      <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 2 5 5v6.2c0 4.4 2.8 8.4 7 10.8 4.2-2.4 7-6.4 7-10.8V5l-7-3Zm-1 14-3.2-3.2 1.4-1.4 1.8 1.8 4.2-4.2 1.4 1.4L11 16Z"/></symbol>
      <symbol id="i-send" viewBox="0 0 24 24"><path d="M3 20 21 12 3 4v6l11 2-11 2v6Z"/></symbol>
      <symbol id="i-mic" viewBox="0 0 24 24"><path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Zm7 8a7 7 0 0 1-6 6.9V21h-2v-3.1A7 7 0 0 1 5 11h2a5 5 0 0 0 10 0h2Z"/></symbol>
      <symbol id="i-search" viewBox="0 0 24 24"><path d="M10.5 4a6.5 6.5 0 1 0 4.1 11.5l4 4 1.4-1.4-4-4A6.5 6.5 0 0 0 10.5 4Zm0 2a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Z"/></symbol>
      <symbol id="i-settings" viewBox="0 0 24 24"><path d="M19.4 13.5c.1-.5.1-1 .1-1.5s0-1-.1-1.5l2-1.5-2-3.5-2.4 1a7.7 7.7 0 0 0-2.6-1.5L14 2h-4l-.4 3A7.7 7.7 0 0 0 7 6.5l-2.4-1-2 3.5 2 1.5A8 8 0 0 0 4.5 12c0 .5 0 1 .1 1.5l-2 1.5 2 3.5 2.4-1a7.7 7.7 0 0 0 2.6 1.5l.4 3h4l.4-3a7.7 7.7 0 0 0 2.6-1.5l2.4 1 2-3.5-2-1.5ZM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Z"/></symbol>
      <symbol id="i-plus" viewBox="0 0 24 24"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"/></symbol>
      <symbol id="i-close" viewBox="0 0 24 24"><path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12l5.6 5.6-1.4 1.4-5.6-5.6L6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5Z"/></symbol>
    </svg>

    <div id="authView" class="auth-view" hidden>
      <section class="auth-panel">
        <div class="brand-mark">WM</div>
        <h1>AI WorkMate</h1>
        <p class="muted">Secure AI operating system</p>
        <form id="authForm" class="form-stack">
          <label id="nameField">Name<input name="name" autocomplete="name"></label>
          <label>Email<input name="email" type="email" autocomplete="email" required></label>
          <label>Password<input name="password" type="password" autocomplete="current-password" minlength="8" required></label>
          <button class="primary-button" type="submit">Create Secure Workspace</button>
        </form>
        <button id="authSwitch" class="ghost-button" type="button">Use Existing Account</button>
        <p id="authError" class="error-line" role="alert"></p>
      </section>
    </div>

    <div id="app" class="app-shell" hidden>
      <aside class="sidebar">
        <div class="brand-row">
          <div class="brand-mark">WM</div>
          <div>
            <strong>AI WorkMate</strong>
            <span id="providerStatus">Local core</span>
          </div>
        </div>
        <nav class="nav-list" aria-label="Primary">
          <button class="nav-item active" data-view="chat"><svg><use href="#i-chat"></use></svg><span>Chat</span></button>
          <button class="nav-item" data-view="dashboard"><svg><use href="#i-grid"></use></svg><span>Dashboard</span></button>
          <button class="nav-item" data-view="memory"><svg><use href="#i-brain"></use></svg><span>Memory</span></button>
          <button class="nav-item" data-view="uploads"><svg><use href="#i-upload"></use></svg><span>Files</span></button>
          <button class="nav-item" data-view="admin"><svg><use href="#i-shield"></use></svg><span>Admin</span></button>
          <button class="nav-item" data-view="settings"><svg><use href="#i-settings"></use></svg><span>Settings</span></button>
        </nav>
        <div class="sidebar-footer">
          <div class="mini-status">
            <span>Live</span><strong id="liveStatus">Ready</strong>
          </div>
          <div class="mini-status">
            <span>Memory</span><strong id="memoryStatus">On</strong>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <button id="mobileMenu" class="icon-button mobile-only" aria-label="Menu"><svg><use href="#i-grid"></use></svg></button>
          <div class="mode-switch" role="group" aria-label="Mode">
            <button class="mode-button active" data-mode="general">General</button>
            <button class="mode-button" data-mode="medical">Medical</button>
          </div>
          <div class="top-actions">
            <label class="toggle"><input id="liveToggle" type="checkbox" checked><span>Live</span></label>
            <label class="toggle"><input id="memoryToggle" type="checkbox" checked><span>Memory</span></label>
            <button id="themeButton" class="icon-button" aria-label="Theme"><svg><use href="#i-settings"></use></svg></button>
            <button id="logoutButton" class="ghost-button">Sign Out</button>
          </div>
        </header>

        <section id="chatView" class="view active-view">
          <div class="chat-layout">
            <section class="conversation-panel">
              <div id="messageList" class="message-list" aria-live="polite"></div>
              <form id="composer" class="composer">
                <div id="attachedFiles" class="attached-files"></div>
                <textarea id="promptInput" rows="1" placeholder="Ask AI WorkMate anything"></textarea>
                <div class="composer-actions">
                  <input id="fileInput" type="file" multiple hidden>
                  <button id="attachButton" class="icon-button" type="button" aria-label="Attach files"><svg><use href="#i-upload"></use></svg></button>
                  <button id="voiceButton" class="icon-button" type="button" aria-label="Voice input"><svg><use href="#i-mic"></use></svg></button>
                  <button class="send-button" type="submit" aria-label="Send"><svg><use href="#i-send"></use></svg></button>
                </div>
              </form>
            </section>
            <aside class="inspector">
              <div class="panel-head">
                <h2>Context</h2>
                <button id="newChatButton" class="icon-button" aria-label="New chat"><svg><use href="#i-plus"></use></svg></button>
              </div>
              <div class="context-grid">
                <div class="metric-card"><span>Tools</span><strong id="toolCount">0</strong></div>
                <div class="metric-card"><span>Files</span><strong id="fileCount">0</strong></div>
                <div class="metric-card"><span>Recall</span><strong id="recallCount">0</strong></div>
              </div>
              <div id="contextFeed" class="feed-list"></div>
              <h3>Conversations</h3>
              <div id="conversationList" class="compact-list"></div>
            </aside>
          </div>
        </section>

        <section id="dashboardView" class="view">
          <div class="section-title"><h2>System Health</h2><button id="refreshMetrics" class="ghost-button">Refresh</button></div>
          <div class="dashboard-grid" id="dashboardCards"></div>
          <div class="wide-panel">
            <h3>Activity</h3>
            <div id="activityBars" class="activity-bars"></div>
          </div>
        </section>

        <section id="memoryView" class="view">
          <div class="section-title"><h2>Memory</h2><button id="refreshMemory" class="ghost-button">Refresh</button></div>
          <form id="memoryForm" class="inline-form">
            <input id="memoryInput" placeholder="Save a preference, project, or important fact">
            <button class="primary-button" type="submit">Save</button>
          </form>
          <div id="memoryList" class="data-list"></div>
        </section>

        <section id="uploadsView" class="view">
          <div class="section-title"><h2>Files</h2><button id="uploadViewButton" class="primary-button">Upload</button></div>
          <div id="uploadDrop" class="drop-zone">
            <svg><use href="#i-upload"></use></svg>
            <strong>Image, PDF, document, screenshot</strong>
            <span id="uploadLimit">Secure private storage</span>
          </div>
          <div id="uploadList" class="data-list"></div>
        </section>

        <section id="adminView" class="view">
          <div class="section-title"><h2>Enterprise Console</h2><button id="refreshAdmin" class="ghost-button">Refresh</button></div>
          <div id="adminSummary" class="dashboard-grid"></div>
          <div class="wide-panel">
            <h3>Audit Trail</h3>
            <div id="auditList" class="audit-list"></div>
          </div>
        </section>

        <section id="settingsView" class="view">
          <div class="section-title"><h2>Account</h2></div>
          <form id="settingsForm" class="settings-grid">
            <label>Name<input id="settingsName"></label>
            <label>Default Mode<select id="settingsMode"><option value="general">General</option><option value="medical">Medical</option></select></label>
            <label>Theme<select id="settingsTheme"><option value="system">System</option><option value="dark">Dark</option><option value="light">Light</option></select></label>
            <button class="primary-button" type="submit">Save Settings</button>
          </form>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script src="/app.js?v=20260530-v3" type="module"></script>
  </body>
</html>
